<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EDF Design</title>
<style>
  :root {
    --bg: #101114;
    --panel: #17181c;
    --panel-2: #1d1f24;
    --border: #2a2c33;
    --text: #e8e9ec;
    --text-dim: #8b8e98;
    --accent: #4d7cfe;
    --accent-hover: #6890ff;
    --danger: #ff5c5c;
    --radius: 10px;
    --mono: ui-monospace, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, "Segoe UI", Inter, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    font-size: 14px;
  }

  /* ---- Header ---- */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    font-weight: 700;
    letter-spacing: -0.02em;
    font-size: 15px;
  }
  .logo span { color: var(--accent); }
  .badge {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 3px 10px;
  }
  .header-actions { margin-left: auto; display: flex; gap: 8px; }

  /* ---- Layout ---- */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 340px 1fr;
    min-height: 0;
  }
  @media (max-width: 800px) { main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; } }

  /* ---- Panneau gauche : fil de conversation ---- */
  aside {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .thread-head {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .thread-head h2 {
    font-size: 13px;
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .thread {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .bubble {
    align-self: flex-end;
    max-width: 88%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-right-radius: 4px;
    padding: 10px 12px;
    line-height: 1.5;
    white-space: pre-wrap;
    overflow-wrap: break-word;
  }
  .card {
    align-self: stretch;
    text-align: left;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    color: var(--text);
    font-weight: 400;
    transition: border-color 150ms, background 150ms;
  }
  .card:hover { border-color: var(--text-dim); }
  .card.active { border-color: var(--accent); background: var(--panel-2); }
  .card .v-num { font-family: var(--mono); font-size: 11px; color: var(--accent); }
  .card .v-meta { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-left: 8px; }
  .empty { color: var(--text-dim); font-size: 13px; line-height: 1.6; margin: auto; text-align: center; padding: 24px; }

  button {
    font: inherit;
    border: none;
    border-radius: var(--radius);
    padding: 10px 16px;
    cursor: pointer;
    font-weight: 600;
  }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .btn-primary { background: var(--accent); color: #fff; width: 100%; margin-top: 10px; }
  .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.5; cursor: wait; }
  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 7px 12px;
    font-weight: 500;
    font-size: 13px;
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--text-dim); }
  .btn-small { padding: 4px 10px; font-size: 12px; }

  /* ---- Composer ---- */
  .composer-zone { border-top: 1px solid var(--border); flex-shrink: 0; }
  .composer {
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .composer textarea {
    flex: 1;
    min-height: 40px;
    max-height: 132px;
    resize: none;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 10px 12px;
    font: inherit;
    line-height: 1.5;
  }
  .composer textarea:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: transparent; }
  .composer .btn-primary { width: auto; margin: 0; padding: 10px 14px; }
  .composer .btn-attach { padding: 10px 12px; font-size: 15px; line-height: 1.5; }
  .attachments {
    display: flex;
    gap: 8px;
    padding: 10px 16px 0;
  }
  .attachments.hidden { display: none; }
  .attach-item { position: relative; }
  .attach-item img {
    width: 56px; height: 56px;
    object-fit: cover;
    border-radius: 8px;
    border: 1px solid var(--border);
    display: block;
  }
  .attach-remove {
    position: absolute; top: -6px; right: -6px;
    width: 20px; height: 20px;
    padding: 0;
    border-radius: 50%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 11px; line-height: 1;
  }
  .attach-remove:hover, .attach-remove:focus-visible { color: var(--danger); border-color: var(--danger); }
  .composer-hint {
    padding: 8px 16px 0;
    font-size: 12px;
    color: var(--danger);
    line-height: 1.4;
  }
  .composer-hint:empty { display: none; }
  .composer.drag-over textarea { outline: 2px dashed var(--accent); outline-offset: 1px; }
  .bubble .bubble-images { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .bubble .bubble-images img {
    width: 72px; height: 72px;
    object-fit: cover;
    border-radius: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    display: block;
  }
  .sr-only {
    position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0;
  }

  /* ---- Tiroir sessions ---- */
  .drawer-backdrop {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 9;
  }
  .drawer {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: 320px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    z-index: 10;
    display: flex;
    flex-direction: column;
    padding: 16px;
    overflow-y: auto;
  }
  .drawer-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .drawer-head h2 { font-size: 12px; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .drawer.hidden, .drawer-backdrop.hidden { display: none; }
  .session-row { position: relative; }
  .session-row .card { width: 100%; padding-right: 36px; margin-bottom: 8px; display: block; }
  .s-title { display: block; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .s-meta { display: block; font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-top: 3px; }
  .session-delete {
    position: absolute; top: 8px; right: 8px;
    background: transparent; border: 1px solid transparent;
    color: var(--text-dim); padding: 2px 8px; font-size: 14px; line-height: 1; border-radius: 6px;
  }
  .session-delete:hover, .session-delete:focus-visible { color: var(--danger); border-color: var(--danger); }

  /* ---- Préview ---- */
  .preview {
    display: flex;
    flex-direction: column;
    min-height: 0;
    background:
      linear-gradient(45deg, #16171b 25%, transparent 25%, transparent 75%, #16171b 75%),
      linear-gradient(45deg, #16171b 25%, #131418 25%, #131418 75%, #16171b 75%);
    background-size: 24px 24px;
    background-position: 0 0, 12px 12px;
  }
  .preview-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .preview-bar .title { font-size: 13px; color: var(--text-dim); font-family: var(--mono); }
  .preview-bar .actions { margin-left: auto; display: flex; gap: 8px; }
  iframe { flex: 1; border: none; background: #fff; width: 100%; }
  iframe.hidden, .state.hidden { display: none; }

  /* ---- États ---- */
  .state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 40px;
    text-align: center;
  }
  .state p { color: var(--text-dim); max-width: 420px; line-height: 1.6; }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { .spinner { animation-duration: 2s; } }
  .activity {
    align-self: stretch;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
  }
  .activity .spinner { width: 16px; height: 16px; border-width: 2px; flex-shrink: 0; }
  .activity .a-label { font-size: 13px; }
  .activity .a-meta { font-family: var(--mono); font-size: 11.5px; color: var(--text-dim); margin-left: auto; white-space: nowrap; }
  .card-error {
    align-self: stretch;
    background: color-mix(in srgb, var(--danger) 10%, transparent);
    border: 1px solid var(--danger);
    border-radius: var(--radius);
    padding: 10px 12px;
    color: var(--danger);
    font-size: 13px;
    line-height: 1.5;
  }
  .card-error .btn-ghost { margin-top: 8px; color: var(--text); }
</style>
</head>
<body>

<header>
  <div class="logo">EDF <span>Design</span></div>
  <div class="badge" id="modelBadge">portail IAG · stream tolérant</div>
  <div class="header-actions">
    <button class="btn-ghost" id="sessionsBtn" aria-haspopup="dialog" aria-expanded="false">Sessions</button>
    <button class="btn-ghost" id="newSessionBtn">Nouveau design</button>
    <button class="btn-ghost" id="copyBtn" disabled>Copier le code</button>
    <button class="btn-ghost" id="downloadBtn" disabled>Télécharger .html</button>
  </div>
</header>

<div class="drawer-backdrop hidden" id="drawerBackdrop"></div>
<div class="drawer hidden" id="drawer" role="dialog" aria-modal="true" aria-labelledby="drawerTitle">
  <div class="drawer-head">
    <h2 id="drawerTitle">Sessions</h2>
    <button class="btn-ghost btn-small" id="drawerCloseBtn" aria-label="Fermer les sessions">✕</button>
  </div>
  <div id="sessionList" role="list" aria-labelledby="drawerTitle">
    <p class="empty">Aucune session enregistrée.</p>
  </div>
</div>

<main>
  <aside>
    <div class="thread-head">
      <h2 id="threadTitle">Nouveau design</h2>
    </div>
    <div class="thread" id="thread"></div>
    <div class="composer-zone">
      <div class="attachments hidden" id="attachments"></div>
      <p class="composer-hint" id="composerHint" role="status"></p>
      <div class="composer">
        <button class="btn-ghost btn-attach" id="attachBtn" aria-label="Joindre une image (wireframe, maquette)" title="Joindre une image">📎</button>
        <input type="file" id="fileInput" class="sr-only" accept="image/png,image/jpeg,image/webp" multiple tabindex="-1" />
        <label for="prompt" class="sr-only">Décris l'interface ou la modification</label>
        <textarea id="prompt" rows="1" placeholder="Décris l'interface ou la modification…"></textarea>
        <button class="btn-primary" id="generateBtn">Générer</button>
      </div>
    </div>
  </aside>

  <section class="preview">
    <div class="preview-bar">
      <span class="title" id="previewTitle">preview</span>
      <div class="actions">
        <button class="btn-ghost" id="openTabBtn" disabled>Ouvrir dans un onglet</button>
      </div>
    </div>

    <div class="state" id="idleState">
      <p>Décris une interface à gauche et lance la génération.<br />Le résultat s'affichera ici, itérable version par version.</p>
    </div>

    <iframe id="frame" class="hidden" title="Prévisualisation de l'interface générée"></iframe>
  </section>
</main>

<script>
  const $ = (id) => document.getElementById(id);
  let sessions = [];          // métadonnées { id, title, createdAt, updatedAt, versionCount }
  let currentSessionId = null;
  let versions = [];          // cache d'affichage de la session chargée — le serveur fait foi
  let activeIndex = -1;
  let currentBlobUrl = null;

  function setState(name) {
    ["idleState"].forEach((s) => $(s).classList.add("hidden"));
    $("frame").classList.add("hidden");
    if (name === "frame") $("frame").classList.remove("hidden");
    else $(name).classList.remove("hidden");
  }

  function fmtDate(iso) {
    return new Date(iso).toLocaleString("fr-FR", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" });
  }

  /* ---- Sessions ---- */

  function renderSessions() {
    const list = $("sessionList");
    list.innerHTML = "";
    if (!sessions.length) {
      list.innerHTML = '<p class="empty">Aucune session enregistrée.</p>';
      return;
    }
    sessions.forEach((s) => {
      const row = document.createElement("div");
      row.className = "session-row";
      row.setAttribute("role", "listitem");

      const open = document.createElement("button");
      open.className = "card" + (s.id === currentSessionId ? " active" : "");
      open.innerHTML = '<span class="s-title"></span><span class="s-meta"></span>';
      open.querySelector(".s-title").textContent = s.title;
      open.querySelector(".s-meta").textContent = `${s.versionCount} version${s.versionCount > 1 ? "s" : ""} · ${fmtDate(s.updatedAt)}`;
      open.addEventListener("click", () => { openSession(s.id); closeDrawer(); });

      const del = document.createElement("button");
      del.className = "session-delete";
      del.textContent = "✕";
      del.setAttribute("aria-label", `Supprimer la session ${s.title}`);
      del.addEventListener("click", (e) => { e.stopPropagation(); deleteSession(s.id, s.title); });

      row.append(open, del);
      list.appendChild(row);
    });
  }

  async function loadSessionList() {
    try {
      const res = await fetch("/api/sessions");
      sessions = res.ok ? await res.json() : [];
    } catch { sessions = []; }
    renderSessions();
  }

  async function openSession(id) {
    pending = null;
    try {
      const res = await fetch(`/api/sessions/${id}`);
      if (!res.ok) {
        // Supprimée entre-temps (fichier retiré à la main) : on la retire de la liste
        sessions = sessions.filter((s) => s.id !== id);
        if (currentSessionId === id) newDesign(); else renderSessions();
        return;
      }
      const s = await res.json();
      currentSessionId = s.id;
      versions = s.versions;
      $("threadTitle").textContent = s.title;
      renderSessions();
      if (versions.length) selectVersion(versions.length - 1);
      else { activeIndex = -1; renderThread(); setState("idleState"); }
    } catch (err) {
      pending = {
        prompt: "", gid: null,
        startedAt: Date.now(), phase: null, chars: 0,
        error: `Impossible de charger la session : ${err.message}`,
        retry: () => openSession(id),
      };
      renderThread();
    }
  }

  function newDesign() {
    pending = null;
    currentSessionId = null;
    versions = [];
    activeIndex = -1;
    $("threadTitle").textContent = "Nouveau design";
    renderThread();
    renderSessions();
    setState("idleState");
    ["copyBtn", "downloadBtn", "openTabBtn"].forEach((id) => ($(id).disabled = true));
    $("previewTitle").textContent = "preview";
    $("prompt").focus();
  }

  async function deleteSession(id, title) {
    if (!confirm(`Supprimer la session « ${title} » et toutes ses versions ?`)) return;
    try { await fetch(`/api/sessions/${id}`, { method: "DELETE" }); } catch { /* déjà absente : on nettoie quand même l'UI */ }
    sessions = sessions.filter((s) => s.id !== id);
    if (currentSessionId === id) newDesign(); else renderSessions();
  }

  /* ---- Fil de conversation ---- */

  // pending : état de la génération en cours affiché dans le fil (Task 3). null = aucune.
  let pending = null;

  function renderThread() {
    const thread = $("thread");
    // Ne force le scroll bas que si l'utilisateur y était déjà : pendant le
    // polling (re-render toutes les 500 ms), remonter lire le fil doit rester possible.
    const enBas = thread.scrollHeight - thread.scrollTop - thread.clientHeight < 80;
    thread.innerHTML = "";
    if (!versions.length && !pending) {
      thread.innerHTML = '<p class="empty">Décris une interface ci-dessous et lance la génération.<br />Chaque échange devient une version, cliquable pour y revenir.</p>';
      return;
    }
    versions.forEach((v, i) => {
      thread.appendChild(creerBulle(v.prompt, v.images));

      const card = document.createElement("button");
      card.className = "card" + (i === activeIndex ? " active" : "");
      card.innerHTML = '<span class="v-num"></span><span class="v-meta"></span>';
      card.querySelector(".v-num").textContent = `v${i + 1}`;
      card.querySelector(".v-meta").textContent = fmtDate(v.createdAt);
      card.setAttribute("aria-label", `Afficher la version ${i + 1}`);
      card.addEventListener("click", () => selectVersion(i));
      thread.appendChild(card);
    });
    renderPending(thread); // no-op tant que pending === null
    if (enBas) thread.scrollTop = thread.scrollHeight;
  }

  const PHASE_LABELS = {
    attente: "Envoi au portail IAG…",
    génération: "Génération en cours…",
    extraction: "Extraction du HTML…",
    enregistré: "Version enregistrée",
  };

  function creerBulle(texte, images) {
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = texte;
    if (images && images.length) {
      const zone = document.createElement("div");
      zone.className = "bubble-images";
      images.forEach((url, i) => {
        const img = document.createElement("img");
        img.src = url;
        img.alt = `Image jointe ${i + 1}`;
        img.addEventListener("click", () => ouvrirImage(url));
        zone.appendChild(img);
      });
      bubble.appendChild(zone);
    }
    return bubble;
  }

  function renderPending(thread) {
    if (!pending) return;
    if (pending.prompt) thread.appendChild(creerBulle(pending.prompt, pending.images));

    if (pending.error) {
      const card = document.createElement("div");
      card.className = "card-error";
      card.setAttribute("role", "alert");
      const msg = document.createElement("div");
      msg.textContent = pending.error;
      const retry = document.createElement("button");
      retry.className = "btn-ghost";
      retry.textContent = "Réessayer";
      retry.addEventListener("click", () => {
        const r = pending.retry;
        pending = null;
        r();
      });
      card.append(msg, retry);
      thread.appendChild(card);
      return;
    }

    const card = document.createElement("div");
    card.className = "activity";
    card.setAttribute("role", "status");
    const secs = Math.round((Date.now() - pending.startedAt) / 1000);
    const meta = pending.chars > 0 ? `${pending.chars.toLocaleString("fr-FR")} car. · ${secs} s` : `${secs} s`;
    card.innerHTML = '<div class="spinner" aria-hidden="true"></div><span class="a-label"></span><span class="a-meta"></span>';
    card.querySelector(".a-label").textContent = PHASE_LABELS[pending.phase] || PHASE_LABELS.attente;
    card.querySelector(".a-meta").textContent = meta;
    thread.appendChild(card);
  }

  // Met à jour la carte d'activité en place, sans reconstruire le fil :
  // préserve le focus clavier et la live region role="status" pendant le polling.
  function majCarteActivite() {
    const card = $("thread").querySelector(".activity");
    if (!card) { renderThread(); return; }
    const secs = Math.round((Date.now() - pending.startedAt) / 1000);
    card.querySelector(".a-label").textContent = PHASE_LABELS[pending.phase] || PHASE_LABELS.attente;
    card.querySelector(".a-meta").textContent =
      pending.chars > 0 ? `${pending.chars.toLocaleString("fr-FR")} car. · ${secs} s` : `${secs} s`;
  }

  function selectVersion(i) {
    activeIndex = i;
    // Blob URL plutôt que srcdoc : contexte d'exécution normal, Tailwind CDN
    // fonctionne exactement comme dans "Ouvrir dans un onglet"
    if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
    currentBlobUrl = URL.createObjectURL(new Blob([versions[i].html], { type: "text/html" }));
    $("frame").src = currentBlobUrl;
    $("previewTitle").textContent = `v${i + 1} — ${versions[i].prompt.slice(0, 60)}`;
    ["copyBtn", "downloadBtn", "openTabBtn"].forEach((id) => ($(id).disabled = false));
    setState("frame");
    renderThread();
  }

  /* ---- Pièces jointes (wireframes, maquettes) ---- */

  const MAX_IMAGES = 3;
  const MAX_COTE = 1568; // côté long envoyé au modèle : suffisant, borne les tokens
  let imagesEnAttente = []; // data URLs JPEG compressées

  function hint(msg) { $("composerHint").textContent = msg || ""; }

  async function compresserImage(fichier) {
    const bmp = await createImageBitmap(fichier);
    const ratio = Math.min(1, MAX_COTE / Math.max(bmp.width, bmp.height));
    const canvas = document.createElement("canvas");
    canvas.width = Math.round(bmp.width * ratio);
    canvas.height = Math.round(bmp.height * ratio);
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#fff"; // les PNG transparents deviennent des JPEG sur fond blanc
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(bmp, 0, 0, canvas.width, canvas.height);
    bmp.close();
    return canvas.toDataURL("image/jpeg", 0.85);
  }

  // Sérialise les ajouts : deux collages/drops rapprochés ne peuvent pas
  // se doubler pendant la compression et dépasser MAX_IMAGES
  let ajoutEnCours = Promise.resolve();
  function ajouterImages(fichiers) {
    ajoutEnCours = ajoutEnCours.then(() => ajouterImagesSeq(fichiers));
    return ajoutEnCours;
  }

  async function ajouterImagesSeq(fichiers) {
    for (const f of fichiers) {
      if (!/^image\/(png|jpeg|webp)$/.test(f.type)) { hint(`« ${f.name} » ignoré : seuls PNG, JPEG et WebP sont acceptés.`); continue; }
      if (f.size > 10 * 1024 * 1024) { hint(`« ${f.name} » ignoré : fichier trop lourd (10 Mo max).`); continue; }
      if (imagesEnAttente.length >= MAX_IMAGES) { hint(`3 images maximum par message.`); break; }
      try {
        imagesEnAttente.push(await compresserImage(f));
        hint("");
      } catch {
        hint(`Impossible de lire « ${f.name} ».`);
      }
    }
    renderAttachments();
  }

  function renderAttachments() {
    const zone = $("attachments");
    zone.innerHTML = "";
    zone.classList.toggle("hidden", imagesEnAttente.length === 0);
    imagesEnAttente.forEach((url, i) => {
      const item = document.createElement("div");
      item.className = "attach-item";
      const img = document.createElement("img");
      img.src = url;
      img.alt = `Image jointe ${i + 1}`;
      const del = document.createElement("button");
      del.className = "attach-remove";
      del.textContent = "✕";
      del.setAttribute("aria-label", `Retirer l'image ${i + 1}`);
      del.addEventListener("click", () => {
        imagesEnAttente.splice(i, 1);
        renderAttachments();
      });
      item.append(img, del);
      zone.appendChild(item);
    });
  }

  function ouvrirImage(dataUrl) {
    // Chrome bloque les data URLs en navigation directe : on passe par une Blob URL,
    // révoquée après ouverture (l'onglet garde son contenu, l'URL n'est plus nécessaire)
    fetch(dataUrl).then((r) => r.blob()).then((b) => {
      const u = URL.createObjectURL(b);
      window.open(u, "_blank");
      setTimeout(() => URL.revokeObjectURL(u), 60000);
    });
  }

  $("attachBtn").addEventListener("click", () => $("fileInput").click());
  $("fileInput").addEventListener("change", () => {
    ajouterImages([...$("fileInput").files]);
    $("fileInput").value = "";
  });
  $("prompt").addEventListener("paste", (e) => {
    const imgs = [...(e.clipboardData?.items || [])].filter((it) => it.type.startsWith("image/"));
    if (imgs.length) {
      e.preventDefault();
      ajouterImages(imgs.map((it) => it.getAsFile()).filter(Boolean));
    }
  });
  const composerEl = document.querySelector(".composer");
  composerEl.addEventListener("dragover", (e) => { e.preventDefault(); composerEl.classList.add("drag-over"); });
  composerEl.addEventListener("dragleave", () => composerEl.classList.remove("drag-over"));
  composerEl.addEventListener("drop", (e) => {
    e.preventDefault();
    composerEl.classList.remove("drag-over");
    ajouterImages([...(e.dataTransfer?.files || [])].filter((f) => f.type.startsWith("image/")));
  });

  /* ---- Génération ---- */

  async function generate() {
    const prompt = $("prompt").value.trim();
    if (!prompt || (pending && !pending.error)) return;
    const requestSessionId = currentSessionId;
    let aNavigue = false;
    const gid = crypto.randomUUID();
    const imagesEnvoyees = imagesEnAttente;
    pending = {
      prompt, gid,
      images: imagesEnvoyees,
      startedAt: Date.now(), phase: "attente", chars: 0, error: null,
      retry: () => { if (!$("prompt").value.trim()) $("prompt").value = prompt; generate(); },
    };
    imagesEnAttente = [];
    renderAttachments();
    hint("");
    $("generateBtn").disabled = true;
    $("prompt").disabled = true;
    $("prompt").value = "";
    $("prompt").style.height = "auto";
    renderThread();

    // Polling : rafraîchit la carte d'activité tant que CETTE génération est
    // affichée. Un échec de poll ne coupe jamais la génération elle-même.
    const poll = setInterval(async () => {
      if (!pending || pending.gid !== gid || currentSessionId !== requestSessionId) return;
      try {
        const r = await fetch(`/api/progress/${gid}`);
        if (r.ok) {
          const j = await r.json();
          pending.phase = j.phase;
          pending.chars = j.chars;
        }
      } catch { /* réseau : on garde le temps écoulé local */ }
      if (pending && pending.gid === gid && currentSessionId === requestSessionId && !pending.error) majCarteActivite();
    }, 500);

    try {
      const res = await fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          prompt,
          sessionId: currentSessionId,
          versionIndex: activeIndex >= 0 ? activeIndex : undefined,
          generationId: gid,
          images: imagesEnvoyees.length ? imagesEnvoyees : undefined,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Erreur inconnue");

      if (currentSessionId !== requestSessionId) {
        // L'utilisateur a changé de session pendant la génération : le serveur
        // a persisté la version, on rafraîchit les métadonnées sans toucher au fil.
        aNavigue = true;
        pending = null;
        await loadSessionList();
        return;
      }

      pending = null;
      const isNew = !currentSessionId;
      currentSessionId = data.sessionId;
      versions.push(data.version);
      if (isNew) {
        $("threadTitle").textContent = data.title;
        sessions.unshift({
          id: data.sessionId,
          title: data.title,
          createdAt: data.version.createdAt,
          updatedAt: data.version.createdAt,
          versionCount: versions.length,
        });
      } else {
        const meta = sessions.find((s) => s.id === currentSessionId);
        if (meta) { meta.updatedAt = data.version.createdAt; meta.versionCount = versions.length; }
        sessions.sort((a, b) => b.updatedAt.localeCompare(a.updatedAt));
      }
      selectVersion(versions.length - 1);
      renderSessions();
    } catch (err) {
      if (currentSessionId === requestSessionId && pending && pending.gid === gid) {
        pending.error = err.message;
        // Restitue les images au composer : Réessayer comme une reformulation
        // repartent avec — sauf si l'utilisateur en a déjà rajouté entre-temps
        if (!imagesEnAttente.length) {
          imagesEnAttente = (pending.images || []).slice(); // copie : la bulle figée garde les siennes
          renderAttachments();
        }
        renderThread();
      } else {
        aNavigue = true;
        pending = null;
      }
    } finally {
      clearInterval(poll);
      $("generateBtn").disabled = false;
      $("prompt").disabled = false;
      if (!aNavigue) $("prompt").focus();
    }
  }

  /* ---- Écouteurs ---- */

  $("generateBtn").addEventListener("click", generate);
  $("prompt").addEventListener("keydown", (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === "Enter") generate();
  });
  $("prompt").addEventListener("input", () => {
    const t = $("prompt");
    t.style.height = "auto";
    t.style.height = Math.min(t.scrollHeight, 132) + "px";
  });

  /* ---- Tiroir sessions ---- */

  let drawerReturnFocus = null;

  function openDrawer() {
    drawerReturnFocus = document.activeElement;
    $("drawer").classList.remove("hidden");
    $("drawerBackdrop").classList.remove("hidden");
    $("sessionsBtn").setAttribute("aria-expanded", "true");
    $("drawerCloseBtn").focus();
  }

  function closeDrawer() {
    $("drawer").classList.add("hidden");
    $("drawerBackdrop").classList.add("hidden");
    $("sessionsBtn").setAttribute("aria-expanded", "false");
    if (drawerReturnFocus) drawerReturnFocus.focus();
  }

  $("sessionsBtn").addEventListener("click", openDrawer);
  $("drawerCloseBtn").addEventListener("click", closeDrawer);
  $("drawerBackdrop").addEventListener("click", closeDrawer);
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && !$("drawer").classList.contains("hidden")) closeDrawer();
  });
  // Piège à focus minimal : Tab reste dans le tiroir tant qu'il est ouvert
  $("drawer").addEventListener("keydown", (e) => {
    if (e.key !== "Tab") return;
    const focusables = $("drawer").querySelectorAll("button");
    const first = focusables[0], last = focusables[focusables.length - 1];
    if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
  });
  $("newSessionBtn").addEventListener("click", newDesign);

  $("copyBtn").addEventListener("click", async () => {
    await navigator.clipboard.writeText(versions[activeIndex].html);
    $("copyBtn").textContent = "Copié ✓";
    setTimeout(() => ($("copyBtn").textContent = "Copier le code"), 1500);
  });

  $("downloadBtn").addEventListener("click", () => {
    const blob = new Blob([versions[activeIndex].html], { type: "text/html" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `edf-design-v${activeIndex + 1}.html`;
    a.click();
    URL.revokeObjectURL(a.href);
  });

  $("openTabBtn").addEventListener("click", () => {
    const blob = new Blob([versions[activeIndex].html], { type: "text/html" });
    window.open(URL.createObjectURL(blob), "_blank");
  });

  /* ---- Démarrage : recharge la session la plus récente ---- */
  (async function init() {
    await loadSessionList();
    if (sessions.length) openSession(sessions[0].id);
    else renderThread();
  })();
</script>
</body>
